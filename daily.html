<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 IELTS 영어 | IELTS VOCA</title>
<meta name="description" content="매일 새로운 IELTS 고빈도 어휘와 콜로케이션을 학습하세요. Band 6.0~7.5+ 필수 표현.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange: #f97316;
  --orange-light: #fff7ed;
  --orange-glow: rgba(249,115,22,0.15);
  --orange-deep: #ea580c;
  --green: #34d399;
  --green-deep: #059669;
  --blue: #3b82f6;
  --purple: #a78bfa;
  --gray-50: #fafafa;
  --gray-100: #f5f5f5;
  --gray-200: #e5e5e5;
  --gray-400: #a3a3a3;
  --gray-500: #737373;
  --gray-600: #525252;
  --gray-800: #262626;
  --gray-900: #171717;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  color: var(--gray-900);
  background: var(--gray-900);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  min-height: 100svh;
}

.en { font-family: 'Outfit', sans-serif; }

/* ─── Top bar ─── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  position: relative;
}

.top-bar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: #fff;
}

.top-bar-brand img { width: 28px; height: 28px; border-radius: 8px; }

.top-bar-brand span {
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
}

.top-bar-home {
  font-size: 0.82rem;
  color: var(--gray-400);
  text-decoration: none;
  font-weight: 600;
  transition: color 0.2s;
}

.top-bar-home:hover { color: #fff; }

/* ─── Date header ─── */
.date-header {
  text-align: center;
  padding: 32px 24px 16px;
}

.date-today {
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 8px;
}

.date-full {
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 900;
  color: #fff;
}

/* ─── Section labels ─── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 40px 24px 20px;
  max-width: 640px;
  margin: 0 auto;
}

.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

.section-divider span {
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray-400);
  white-space: nowrap;
}

/* ─── Card container ─── */
.card-container {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ─── Word card ─── */
.word-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 36px 32px;
  position: relative;
  overflow: hidden;
}

.word-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: var(--orange);
  opacity: 0.04;
  pointer-events: none;
}

.word-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.word-band {
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 100px;
  background: rgba(249,115,22,0.15);
  color: var(--orange);
}

.word-pos {
  font-size: 0.78rem;
  color: var(--gray-400);
  font-weight: 500;
  font-style: italic;
}

.word-english {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(2.2rem, 7vw, 3.2rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 8px;
}

.word-meaning {
  font-size: 1.15rem;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
  margin-bottom: 28px;
}

.word-example {
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  padding: 20px 22px;
  border-left: 3px solid var(--orange);
}

.word-example .ex-en {
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  color: rgba(255,255,255,0.9);
  font-weight: 500;
  line-height: 1.55;
  margin-bottom: 8px;
}

.word-example .ex-ko {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.4);
  line-height: 1.5;
}

/* ─── Collocation card ─── */
.colloc-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 36px 32px;
  position: relative;
  overflow: hidden;
}

.colloc-card::before {
  content: '';
  position: absolute;
  top: -60px; left: -60px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: var(--green);
  opacity: 0.04;
  pointer-events: none;
}

.colloc-phrase {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.8rem, 5.5vw, 2.6rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 8px;
}

.colloc-meaning {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 24px;
}

.colloc-examples {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.colloc-ex {
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 16px 18px;
}

.colloc-ex.correct { border-left: 3px solid var(--green); }
.colloc-ex.wrong { border-left: 3px solid #ef4444; }

.colloc-ex-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.colloc-ex.correct .colloc-ex-label { color: var(--green); }
.colloc-ex.wrong .colloc-ex-label { color: #ef4444; }

.colloc-ex p {
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
}

/* ─── Nav arrows ─── */
.card-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 24px;
}

.card-nav button {
  width: 44px; height: 44px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
}

.card-nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
.card-nav button svg { width: 18px; height: 18px; }

.card-counter {
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  color: var(--gray-400);
  font-weight: 600;
  min-width: 60px;
  text-align: center;
}

/* ─── App CTA bar ─── */
.app-bar {
  max-width: 640px;
  margin: 48px auto 0;
  padding: 0 24px 48px;
}

.app-bar-inner {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
}

.app-bar-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  flex-shrink: 0;
}

.app-bar-text {
  flex: 1;
}

.app-bar-text strong {
  display: block;
  font-size: 0.9rem;
  color: #fff;
  font-weight: 700;
  margin-bottom: 2px;
}

.app-bar-text span {
  font-size: 0.78rem;
  color: var(--gray-400);
}

.app-bar-btn {
  display: inline-flex;
  padding: 10px 20px;
  background: var(--orange);
  color: #fff;
  border-radius: 12px;
  font-size: 0.82rem;
  font-weight: 700;
  text-decoration: none;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 12px rgba(249,115,22,0.3);
}

.app-bar-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(249,115,22,0.4); }

/* ─── Background effects ─── */
.bg-glow {
  position: fixed;
  pointer-events: none;
  z-index: -1;
}

.bg-glow-1 {
  width: 500px; height: 500px;
  border-radius: 50%;
  background: rgba(249,115,22,0.06);
  filter: blur(100px);
  top: -10%; right: -10%;
}

.bg-glow-2 {
  width: 400px; height: 400px;
  border-radius: 50%;
  background: rgba(52,211,153,0.04);
  filter: blur(100px);
  bottom: -10%; left: -10%;
}

/* ─── Mobile ─── */
@media (max-width: 639px) {
  .word-card, .colloc-card { padding: 28px 22px; }
  .app-bar-inner { flex-wrap: wrap; }
  .app-bar-btn { width: 100%; text-align: center; }
}
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<!-- Top bar -->
<div class="top-bar">
  <a href="./" class="top-bar-brand">
    <img src="icon_512.png" alt="IELTS VOCA" width="28" height="28">
    <span class="en">IELTS VOCA</span>
  </a>
  <div style="display:flex;gap:16px">
    <a href="vocab.html" class="top-bar-home">단어 학습</a>
    <a href="./" class="top-bar-home">메인으로</a>
  </div>
</div>

<!-- Date -->
<div class="date-header">
  <div class="date-today en">Daily IELTS English</div>
  <h1 class="date-full" id="dateDisplay"></h1>
</div>

<!-- Word of the Day -->
<div class="section-divider"><span class="en">Word of the Day</span></div>
<div class="card-container">
  <div class="word-card">
    <div class="word-meta">
      <span class="word-band en" id="wordBand"></span>
      <span class="word-pos" id="wordPos"></span>
    </div>
    <div class="word-english en" id="wordEn"></div>
    <div class="word-meaning" id="wordMeaning"></div>
    <div class="word-example">
      <div class="ex-en" id="wordExEn"></div>
      <div class="ex-ko" id="wordExKo"></div>
    </div>
  </div>
  <div class="card-nav">
    <button onclick="changeWord(-1)" aria-label="이전">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="card-counter" id="wordCounter"></span>
    <button onclick="changeWord(1)" aria-label="다음">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<!-- Collocation of the Day -->
<div class="section-divider"><span class="en">Collocation of the Day</span></div>
<div class="card-container">
  <div class="colloc-card">
    <div class="colloc-phrase en" id="collocPhrase"></div>
    <div class="colloc-meaning" id="collocMeaning"></div>
    <div class="colloc-examples">
      <div class="colloc-ex correct">
        <div class="colloc-ex-label">Correct</div>
        <p id="collocCorrect"></p>
      </div>
      <div class="colloc-ex wrong">
        <div class="colloc-ex-label">Common Mistake</div>
        <p id="collocWrong"></p>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button onclick="changeColloc(-1)" aria-label="이전">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="card-counter" id="collocCounter"></span>
    <button onclick="changeColloc(1)" aria-label="다음">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<!-- App CTA -->
<div class="app-bar">
  <div class="app-bar-inner">
    <img class="app-bar-icon" src="icon_512.png" alt="IELTS VOCA" width="44" height="44">
    <div class="app-bar-text">
      <strong>4,000개 어휘를 체계적으로</strong>
      <span>SRS 간격 반복 + 게임으로 완벽 암기</span>
    </div>
    <a href="https://play.google.com/store/apps/details?id=com.young.ielts_prep" class="app-bar-btn" target="_blank" rel="noopener">다운로드</a>
  </div>
</div>

<script>
// ─── Date display ───
var now = new Date();
var months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
var days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
document.getElementById('dateDisplay').textContent = now.getFullYear() + '년 ' + months[now.getMonth()] + ' ' + now.getDate() + '일 ' + days[now.getDay()];

// ─── Hash function ───
function dayHash(d, len) {
  var n = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  return ((n * 2654435761) >>> 0) % len;
}

// ─── Words ───
var WORDS = [
  { word: "ubiquitous", pos: "adjective", band: "Band 7.0+", meaning: "어디에나 있는, 아주 흔한", en: "Social media has become ubiquitous in modern society.", ko: "소셜 미디어는 현대 사회에서 어디에나 존재하게 되었다." },
  { word: "exacerbate", pos: "verb", band: "Band 7.0+", meaning: "악화시키다, 더 심하게 하다", en: "Climate change has exacerbated water shortages worldwide.", ko: "기후 변화는 전 세계적으로 물 부족을 악화시켰다." },
  { word: "mitigate", pos: "verb", band: "Band 7.0+", meaning: "완화하다, 경감시키다", en: "The government took measures to mitigate the impact of inflation.", ko: "정부는 인플레이션의 영향을 완화하기 위한 조치를 취했다." },
  { word: "unprecedented", pos: "adjective", band: "Band 6.5+", meaning: "전례 없는, 유례없는", en: "The pandemic caused an unprecedented disruption to global education.", ko: "팬데믹은 전 세계 교육에 전례 없는 혼란을 야기했다." },
  { word: "detrimental", pos: "adjective", band: "Band 7.0+", meaning: "해로운, 유해한", en: "Excessive screen time can be detrimental to children's development.", ko: "과도한 스크린 타임은 아이들의 발달에 해로울 수 있다." },
  { word: "fluctuate", pos: "verb", band: "Band 6.0+", meaning: "변동하다, 오르내리다", en: "Oil prices tend to fluctuate significantly during economic crises.", ko: "유가는 경제 위기 동안 크게 변동하는 경향이 있다." },
  { word: "deteriorate", pos: "verb", band: "Band 6.5+", meaning: "악화되다, 나빠지다", en: "Air quality continues to deteriorate in many urban areas.", ko: "많은 도시 지역에서 공기 질이 계속 악화되고 있다." },
  { word: "facilitate", pos: "verb", band: "Band 6.5+", meaning: "용이하게 하다, 촉진하다", en: "Technology can facilitate communication between different cultures.", ko: "기술은 서로 다른 문화 간의 소통을 촉진할 수 있다." },
  { word: "substantial", pos: "adjective", band: "Band 6.0+", meaning: "상당한, 실질적인", en: "There has been a substantial increase in renewable energy investment.", ko: "재생 에너지 투자가 상당히 증가했다." },
  { word: "prevalent", pos: "adjective", band: "Band 7.0+", meaning: "널리 퍼진, 유행하는", en: "Online shopping has become increasingly prevalent among young consumers.", ko: "온라인 쇼핑은 젊은 소비자들 사이에서 점점 더 널리 퍼지고 있다." },
  { word: "ambiguous", pos: "adjective", band: "Band 7.0+", meaning: "모호한, 애매한", en: "The survey results were ambiguous and open to different interpretations.", ko: "설문 결과는 모호하여 다양한 해석이 가능했다." },
  { word: "alleviate", pos: "verb", band: "Band 7.0+", meaning: "완화하다, 줄이다", en: "Regular exercise can help alleviate symptoms of depression.", ko: "규칙적인 운동은 우울증 증상을 완화하는 데 도움이 될 수 있다." },
  { word: "paradox", pos: "noun", band: "Band 7.0+", meaning: "역설, 모순", en: "It is a paradox that richer nations often report lower happiness levels.", ko: "더 부유한 국가들이 종종 더 낮은 행복 수준을 보고하는 것은 역설이다." },
  { word: "inevitable", pos: "adjective", band: "Band 6.5+", meaning: "불가피한, 필연적인", en: "Some degree of cultural change is inevitable in a globalised world.", ko: "세계화된 세상에서 어느 정도의 문화적 변화는 불가피하다." },
  { word: "implement", pos: "verb", band: "Band 6.0+", meaning: "시행하다, 실행하다", en: "The school plans to implement a new assessment system next year.", ko: "학교는 내년에 새로운 평가 시스템을 시행할 계획이다." },
  { word: "proliferate", pos: "verb", band: "Band 7.5+", meaning: "급속히 증가하다, 확산되다", en: "Fast food chains have proliferated across developing countries.", ko: "패스트푸드 체인점이 개발도상국 전역에 급속히 증가했다." },
  { word: "versatile", pos: "adjective", band: "Band 7.0+", meaning: "다재다능한, 다용도의", en: "Bamboo is an incredibly versatile material used in construction and textiles.", ko: "대나무는 건설과 섬유에 사용되는 매우 다용도적인 소재이다." },
  { word: "scrutinise", pos: "verb", band: "Band 7.5+", meaning: "면밀히 조사하다, 정밀 검토하다", en: "Researchers scrutinised the data to identify patterns in consumer behaviour.", ko: "연구자들은 소비자 행동의 패턴을 파악하기 위해 데이터를 면밀히 조사했다." },
  { word: "undermine", pos: "verb", band: "Band 6.5+", meaning: "약화시키다, 훼손하다", en: "Corruption can undermine public trust in government institutions.", ko: "부패는 정부 기관에 대한 대중의 신뢰를 약화시킬 수 있다." },
  { word: "inherent", pos: "adjective", band: "Band 7.0+", meaning: "내재하는, 본질적인", en: "There are inherent risks in any form of investment.", ko: "어떤 형태의 투자에도 내재적인 위험이 있다." },
  { word: "disparity", pos: "noun", band: "Band 7.0+", meaning: "격차, 불균형", en: "The disparity between rich and poor continues to widen globally.", ko: "부유층과 빈곤층 사이의 격차가 전 세계적으로 계속 벌어지고 있다." },
  { word: "plausible", pos: "adjective", band: "Band 7.5+", meaning: "그럴듯한, 타당한", en: "The researcher proposed a plausible explanation for the unexpected results.", ko: "연구자는 예상치 못한 결과에 대해 그럴듯한 설명을 제시했다." },
  { word: "conducive", pos: "adjective", band: "Band 7.0+", meaning: "도움이 되는, 이바지하는", en: "A quiet environment is more conducive to effective learning.", ko: "조용한 환경이 효과적인 학습에 더 도움이 된다." },
